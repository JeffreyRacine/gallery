<rect x="42" y="24" width="1000" height="104" rx="18" fill="#173B57" opacity="0.96"/><text x="74" y="70" font-family="Helvetica Neue, Arial" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="start">First, give the predictor its statistical meaning</text><text x="74" y="106" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#D8E7F2" text-anchor="start">The year values are unchanged; their R class differs</text><rect x="75" y="175" width="530" height="390" rx="24" fill="#FFFFFF" stroke="#9A5B13" stroke-width="3"/><text x="340" y="245" font-family="Helvetica Neue, Arial" font-size="32" font-weight="700" fill="#9A5B13" text-anchor="middle">ordered / factor</text><text x="120" y="320" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">class(Italy$year)</text><text x="120" y="370" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#52626E" text-anchor="start">[1] "ordered"  "factor"</text><rect x="120" y="425" width="440" height="82" rx="16" fill="#E4F2EF"/><text x="340" y="475" font-family="Helvetica Neue, Arial" font-size="23" font-weight="700" fill="#173B57" text-anchor="middle">Discrete ordered predictor</text><rect x="675" y="175" width="530" height="390" rx="24" fill="#FFFFFF" stroke="#167568" stroke-width="3"/><text x="940" y="245" font-family="Helvetica Neue, Arial" font-size="32" font-weight="700" fill="#167568" text-anchor="middle">numeric</text><text x="720" y="320" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">class(italy_numeric$year)</text><text x="720" y="370" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#52626E" text-anchor="start">[1] "numeric"</text><rect x="720" y="425" width="440" height="82" rx="16" fill="#E4F2EF"/><text x="940" y="475" font-family="Helvetica Neue, Arial" font-size="23" font-weight="700" fill="#173B57" text-anchor="middle">Continuous predictor</text><text x="640" y="625" font-family="Helvetica Neue, Arial" font-size="23" font-weight="400" fill="#52626E" text-anchor="middle">No kernel or gradient switch is required in the estimator call.</text>
</svg>

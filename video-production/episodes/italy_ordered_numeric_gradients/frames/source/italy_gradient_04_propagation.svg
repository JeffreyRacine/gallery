<rect x="42" y="24" width="950" height="104" rx="18" fill="#173B57" opacity="0.96"/><text x="74" y="70" font-family="Helvetica Neue, Arial" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="start">np propagates that class automatically</text><text x="74" y="106" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#D8E7F2" text-anchor="start">Kernel, cross-validation, plot, and gradient all follow</text><text x="430" y="172" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#9A5B13" text-anchor="middle">Ordered factor</text><text x="930" y="172" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#167568" text-anchor="middle">Numeric</text><rect x="65" y="182" width="1150" height="64" rx="14" fill="#FFFFFF" stroke="#D8E0E6"/><text x="110" y="220" font-family="Helvetica Neue, Arial" font-size="19" font-weight="700" fill="#173B57" text-anchor="start">Kernel</text><text x="430" y="220" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#9A5B13" text-anchor="middle">Li–Racine ordered</text><text x="930" y="220" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#167568" text-anchor="middle">Second-order Gaussian</text><rect x="65" y="260" width="1150" height="64" rx="14" fill="#FFFFFF" stroke="#D8E0E6"/><text x="110" y="298" font-family="Helvetica Neue, Arial" font-size="19" font-weight="700" fill="#173B57" text-anchor="start">Cross-validation tunes</text><text x="430" y="298" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#9A5B13" text-anchor="middle">categorical λ</text><text x="930" y="298" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#167568" text-anchor="middle">continuous bandwidth h</text><rect x="65" y="338" width="1150" height="64" rx="14" fill="#FFFFFF" stroke="#D8E0E6"/><text x="110" y="376" font-family="Helvetica Neue, Arial" font-size="19" font-weight="700" fill="#173B57" text-anchor="start">Fitted plot</text><text x="430" y="376" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#9A5B13" text-anchor="middle">level-specific points</text><text x="930" y="376" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#167568" text-anchor="middle">smooth curve</text><rect x="65" y="416" width="1150" height="64" rx="14" fill="#FFFFFF" stroke="#D8E0E6"/><text x="110" y="454" font-family="Helvetica Neue, Arial" font-size="19" font-weight="700" fill="#173B57" text-anchor="start">Gradient</text><text x="430" y="454" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#9A5B13" text-anchor="middle">adjacent-level Δ</text><text x="930" y="454" font-family="Helvetica Neue, Arial" font-size="20" font-weight="600" fill="#167568" text-anchor="middle">analytic derivative d/d year</text><rect x="195" y="520" width="890" height="85" rx="20" fill="#E4F2EF"/><text x="640" y="570" font-family="Helvetica Neue, Arial" font-size="25" font-weight="700" fill="#173B57" text-anchor="middle">Represent the variable correctly; np handles the statistical machinery.</text>

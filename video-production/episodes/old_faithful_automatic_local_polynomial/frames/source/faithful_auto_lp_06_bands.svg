<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F7F9FC"/>
<rect x="42" y="24" width="850" height="104" rx="18" fill="#173B57" opacity="0.96"/><text x="74" y="70" font-family="Helvetica Neue, Arial" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="start">Three bootstrap variability bounds</text><text x="74" y="106" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#D8E7F2" text-anchor="start">errors = "bootstrap", band = "all", B = 9999</text><rect x="55" y="190" width="350" height="290" rx="22" fill="#FFFFFF" stroke="#D8E0E6" stroke-width="2"/><text x="230" y="255" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#173B57" text-anchor="middle">Pointwise</text><line x1="110" y1="285" x2="350" y2="285" stroke="#2A8C82" stroke-width="3"/><text x="230" y="340" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">At each displayed point</text><text x="230" y="374" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">separately</text><rect x="450" y="190" width="350" height="290" rx="22" fill="#FFFFFF" stroke="#D8E0E6" stroke-width="2"/><text x="625" y="255" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#173B57" text-anchor="middle">Simultaneous</text><line x1="505" y1="285" x2="745" y2="285" stroke="#2A8C82" stroke-width="3"/><text x="625" y="340" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">Across the displayed</text><text x="625" y="374" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">function jointly</text><rect x="845" y="190" width="350" height="290" rx="22" fill="#FFFFFF" stroke="#D8E0E6" stroke-width="2"/><text x="1020" y="255" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#173B57" text-anchor="middle">Bonferroni</text><line x1="900" y1="285" x2="1140" y2="285" stroke="#2A8C82" stroke-width="3"/><text x="1020" y="340" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">Pointwise levels adjusted</text><text x="1020" y="374" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#18242D" text-anchor="middle">for multiple comparisons</text><text x="640" y="560" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#52626E" text-anchor="middle">The Gallery description states the smoothing-bias caveat and links the full theory.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F7F9FC"/>
<rect x="42" y="24" width="760" height="104" rx="18" fill="#173B57" opacity="0.96"/><text x="74" y="70" font-family="Helvetica Neue, Arial" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="start">Estimate the joint distribution</text><text x="74" y="106" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#D8E7F2" text-anchor="start">Target-specific, data-driven smoothing</text><rect x="55" y="170" width="745" height="390" rx="18" fill="#FFFFFF" stroke="#D8E0E6" stroke-width="2"/><rect x="55" y="170" width="745" height="48" rx="18" fill="#173B57"/><rect x="55" y="200" width="745" height="18" fill="#173B57"/><text x="80" y="202" font-family="Menlo, monospace" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="start">R script</text><text x="83" y="254" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">fit_udist &lt;- npudist(</text><text x="83" y="292" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">  ~ eruptions + waiting,</text><text x="83" y="330" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">  data = faithful</text><text x="83" y="368" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">)</text><text x="83" y="406" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">summary(fit_udist$bws)</text><rect x="845" y="185" width="375" height="286" rx="20" fill="#E4F2EF" stroke="#2A8C82" stroke-width="2"/><text x="1032" y="246" font-family="Helvetica Neue, Arial" font-size="28" font-weight="700" fill="#173B57" text-anchor="middle">Bandwidths</text><text x="1032" y="290" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#52626E" text-anchor="middle">selected for this</text><text x="1032" y="326" font-family="Helvetica Neue, Arial" font-size="24" font-weight="700" fill="#2A8C82" text-anchor="middle">joint distribution target</text><text x="1032" y="389" font-family="Helvetica Neue, Arial" font-size="19" font-weight="400" fill="#18242D" text-anchor="middle">Estimated directly for this target</text><text x="1032" y="423" font-family="Helvetica Neue, Arial" font-size="17" font-weight="400" fill="#52626E" text-anchor="middle">A separate estimator may select</text><text x="1032" y="450" font-family="Helvetica Neue, Arial" font-size="17" font-weight="400" fill="#52626E" text-anchor="middle">different smoothing.</text>
</svg>

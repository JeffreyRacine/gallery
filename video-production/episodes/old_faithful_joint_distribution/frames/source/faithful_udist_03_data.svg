<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F7F9FC"/>
<rect x="42" y="24" width="610" height="104" rx="18" fill="#173B57" opacity="0.96"/><text x="74" y="70" font-family="Helvetica Neue, Arial" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="start">One familiar dataset</text><text x="74" y="106" font-family="Helvetica Neue, Arial" font-size="22" font-weight="400" fill="#D8E7F2" text-anchor="start">Old Faithful, built into R</text><rect x="55" y="175" width="700" height="330" rx="18" fill="#FFFFFF" stroke="#D8E0E6" stroke-width="2"/><rect x="55" y="175" width="700" height="48" rx="18" fill="#173B57"/><rect x="55" y="205" width="700" height="18" fill="#173B57"/><text x="80" y="207" font-family="Menlo, monospace" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="start">R script</text><text x="83" y="259" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">library(np)</text><text x="83" y="297" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start">data(faithful, package = "datasets")</text><text x="83" y="335" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start"></text><text x="83" y="373" font-family="Menlo, monospace" font-size="21" font-weight="400" fill="#18242D" text-anchor="start"># next: npudist()</text><rect x="805" y="175" width="415" height="330" rx="20" fill="#E4F2EF" stroke="#2A8C82" stroke-width="2"/><text x="845" y="228" font-family="Helvetica Neue, Arial" font-size="30" font-weight="700" fill="#173B57" text-anchor="start">272 observations</text><text x="845" y="285" font-family="Menlo, monospace" font-size="24" font-weight="700" fill="#18242D" text-anchor="start">eruptions</text><text x="845" y="319" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#52626E" text-anchor="start">duration in minutes</text><text x="845" y="378" font-family="Menlo, monospace" font-size="24" font-weight="700" fill="#18242D" text-anchor="start">waiting</text><text x="845" y="412" font-family="Helvetica Neue, Arial" font-size="20" font-weight="400" fill="#52626E" text-anchor="start">minutes to the next eruption</text><text x="845" y="469" font-family="Helvetica Neue, Arial" font-size="20" font-weight="700" fill="#2A8C82" text-anchor="start">Both variables are numeric</text>
</svg>

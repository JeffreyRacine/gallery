name: Prebuilt Site Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  prebuilt-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify prebuilt Pages artifacts
        run: |
          test -f docs/index.html
          test -f docs/search.json
          test -f docs/sitemap.xml
          test -f .nojekyll
